<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050B14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Design Survey Pro</title>
    <link rel="stylesheet" href="style.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DC9GD6Z"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date()); gtag('config', 'G-0J8DC9GD6Z');
    </script>
</head>
<body>
    <div id="splashScreen">
        <div class="splash-content">
            <img src="logo.jpg" alt="Logo" class="splash-logo" onerror="this.style.display='none'">
            <h1 class="splash-title">PREDESIGN ENGINE</h1>
            <div class="loader-bar"><div class="loader-fill"></div></div>
        </div>
    </div>

    <canvas id="precisionLoupe" width="120" height="120"></canvas>

    <header class="navbar navbar--top" id="mainHeader">
        <div class="navbar__container">
            <h1 class="navbar__title">Survey Pro</h1>
            <div class="nav-controls">
                <select id="brandSelect" class="form-group__input form-group__input--touch nav-select">
                    <option value="Clearview">Clearview</option>
                    <option value="CO Home Improvements">CO Home Improvements</option>
                    <option value="Orion Windows">Orion</option>
                    <option value="Planet">Planet</option>
                    <option value="Trent Valley Windows">Trent Valley</option>
                    <option value="West Yorkshire Windows">West Yorkshire</option>
                    <option value="Yorkshire Windows">Yorkshire Windows</option>
                </select>
                <input list="designerList" id="designerSelect" class="form-group__input form-group__input--touch nav-input" placeholder="Designer...">
                <datalist id="designerList"></datalist>
                <button id="openProfileManagerBtn" class="nav-btn btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main-container main-container--centered">
        <article class="card">
            <h2 class="card__title">Client Profile</h2>
            <div class="form-grid">
                <div class="form-group"><label class="form-group__label">Name</label><input type="text" id="clientName" class="form-group__input"></div>
                <div class="form-group"><label class="form-group__label">Phone</label><input type="tel" id="clientNum" class="form-group__input"></div>
                <div class="form-group"><label class="form-group__label">Postcode</label><input type="text" id="postCode" class="form-group__input"></div>
                <div class="form-group"><label class="form-group__label">Consultation Date</label><input type="date" id="apptDate" class="form-group__input"></div>
                <div class="form-group"><label class="form-group__label">Revisit Date</label><input type="date" id="revisitDate" class="form-group__input"></div>
                <div class="form-group"><label class="form-group__label">Revisit Location</label><input type="text" id="revisitLocation" class="form-group__input" placeholder="e.g. Showroom"></div>
            </div>
        </article>

        <article class="card">
            <h2 class="card__title">Elevations & Markup</h2>
            
            <div class="canvas-group" data-id="frontelevation">
                <div class="custom-file-upload">
                    <input type="file" id="front-cam" class="camera-input hidden-input" accept="image/*">
                    <label for="front-cam" class="upload-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Front Elevation
                    </label>
                </div>
                <div class="canvas-container"><canvas id="canvas-frontelevation" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section">
                        <button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button>
                        <button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg></button>
                        <button type="button" class="tool-btn text-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg></button>
                        <div class="divider"></div>
                        <button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button>
                        <button type="button" class="tool-btn dim-line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.17 3.22a2 2 0 0 0-2.83 0L3.22 18.34a2 2 0 0 0 0 2.83 2 2 0 0 0 2.83 0L21.17 6.05a2 2 0 0 0 0-2.83Z"></path><path d="m5 16 2 2"></path><path d="m8.5 12.5 2 2"></path><path d="m12 9 2 2"></path><path d="m15.5 5.5 2 2"></path></svg></button>
                        <button type="button" class="tool-btn calibrate-btn accent-btn">Set Scale</button>
                    </div>
                    <div class="tool-section flex-right">
                        <button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button>
                        <button type="button" class="tool-btn maximize-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg></button>
                    </div>
                </div>
            </div>

            <div class="canvas-group mt-30" data-id="sideelevation">
                <div class="custom-file-upload">
                    <input type="file" id="side-cam" class="camera-input hidden-input" accept="image/*">
                    <label for="side-cam" class="upload-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Side Elevation
                    </label>
                </div>
                <div class="canvas-container"><canvas id="canvas-sideelevation" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg></button><button type="button" class="tool-btn text-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg></button><div class="divider"></div><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button><button type="button" class="tool-btn dim-line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.17 3.22a2 2 0 0 0-2.83 0L3.22 18.34a2 2 0 0 0 0 2.83 2 2 0 0 0 2.83 0L21.17 6.05a2 2 0 0 0 0-2.83Z"></path><path d="m5 16 2 2"></path><path d="m8.5 12.5 2 2"></path><path d="m12 9 2 2"></path><path d="m15.5 5.5 2 2"></path></svg></button><button type="button" class="tool-btn calibrate-btn accent-btn">Set Scale</button></div>
                    <div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button><button type="button" class="tool-btn maximize-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg></button></div>
                </div>
            </div>

            <div class="canvas-group mt-30" data-id="rearelevation">
                <div class="custom-file-upload">
                    <input type="file" id="rear-cam" class="camera-input hidden-input" accept="image/*">
                    <label for="rear-cam" class="upload-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Rear Elevation
                    </label>
                </div>
                <div class="canvas-container"><canvas id="canvas-rearelevation" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg></button><button type="button" class="tool-btn text-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg></button><div class="divider"></div><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button><button type="button" class="tool-btn dim-line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.17 3.22a2 2 0 0 0-2.83 0L3.22 18.34a2 2 0 0 0 0 2.83 2 2 0 0 0 2.83 0L21.17 6.05a2 2 0 0 0 0-2.83Z"></path><path d="m5 16 2 2"></path><path d="m8.5 12.5 2 2"></path><path d="m12 9 2 2"></path><path d="m15.5 5.5 2 2"></path></svg></button><button type="button" class="tool-btn calibrate-btn accent-btn">Set Scale</button></div>
                    <div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button><button type="button" class="tool-btn maximize-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg></button></div>
                </div>
            </div>
        </article>

        <article class="card">
            <h2 class="card__title">Site Logistics</h2>
            <div class="form-grid">
                <div class="form-group"><label class="form-group__label">Wheelbarrow Issues?</label><select id="accessDifficult" class="form-group__input"><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select></div>
                <div class="form-group"><label class="form-group__label">Narrowest access (mm)</label><input type="number" id="accessWidth" class="form-group__input"></div>
                <div class="form-group"><label class="form-group__label">DPC Depth (mm)</label><input type="number" id="dpcDepth" class="form-group__input"></div>
                <div class="form-group"><label class="form-group__label">House material</label><select id="houseMaterial" class="form-group__input"><option value="">Select...</option><option value="Brick">Brick</option><option value="Stone">Stone</option><option value="Render">Render</option><option value="Other">Other</option></select></div>
            </div>

            <div class="custom-file-upload mt-10">
                <input type="file" id="accessPhotos" class="hidden-input" accept="image/*" multiple>
                <label for="accessPhotos" class="upload-label"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> Upload Access Route Photos</label>
            </div>

            <div class="canvas-group mt-30" data-id="housematerialphoto">
                <div class="custom-file-upload">
                    <input type="file" id="mat-cam" class="camera-input hidden-input" accept="image/*">
                    <label for="mat-cam" class="upload-label"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> House Material Detail</label>
                </div>
                <div class="canvas-container"><canvas id="canvas-housematerialphoto" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg></button><div class="divider"></div><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button><button type="button" class="tool-btn dim-line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.17 3.22a2 2 0 0 0-2.83 0L3.22 18.34a2 2 0 0 0 0 2.83 2 2 0 0 0 2.83 0L21.17 6.05a2 2 0 0 0 0-2.83Z"></path></svg></button></div>
                    <div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button></div>
                </div>
            </div>

            <div class="form-grid mt-30">
                <div class="form-group"><label class="form-group__label">Trees within 30m?</label><select id="treesExist" class="form-group__input"><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select></div>
                <div class="form-group"><label class="form-group__label">Manholes visible?</label><select id="manholeExist" class="form-group__input"><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select></div>
                <div class="form-group"><label class="form-group__label">Weep vents?</label><select id="weepventsExist" class="form-group__input"><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select></div>
                <div class="form-group"><label class="form-group__label">Pipes (RWP/SVP)?</label><select id="pipesExist" class="form-group__input"><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select></div>
                <div class="form-group"><label class="form-group__label">Air Bricks Count</label><select id="airbricks" class="form-group__input"><option value="">Select...</option><option value="No">No</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5+">5+</option></select></div>
                <div class="form-group"><label class="form-group__label">Fascia Height (mm)</label><input type="text" id="fasciaHeight" class="form-group__input"></div>
            </div>

            <div class="canvas-group conditional-field" data-condition="treesExist" data-id="treelocations">
                <div class="custom-file-upload"><input type="file" id="tree-cam" class="camera-input hidden-input" accept="image/*"><label for="tree-cam" class="upload-label"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Tree Reference</label></div>
                <div class="canvas-container"><canvas id="canvas-treelocations" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path></svg></button><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button></div>
                    <div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button></div>
                </div>
            </div>

            <div class="canvas-group conditional-field" data-condition="manholeExist" data-id="manhole">
                <div class="custom-file-upload"><input type="file" id="mh-cam" class="camera-input hidden-input" accept="image/*"><label for="mh-cam" class="upload-label"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Manhole Reference</label></div>
                <div class="canvas-container"><canvas id="canvas-manhole" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path></svg></button><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button></div><div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button></div>
                </div>
            </div>

            <div class="canvas-group conditional-field" data-condition="weepventsExist" data-id="weepvents">
                <div class="custom-file-upload"><input type="file" id="weep-cam" class="camera-input hidden-input" accept="image/*"><label for="weep-cam" class="upload-label"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Weep Vents Reference</label></div>
                <div class="canvas-container"><canvas id="canvas-weepvents" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path></svg></button><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button></div><div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button></div>
                </div>
            </div>

            <div class="canvas-group conditional-field" data-condition="pipesExist" data-id="rwpsvp">
                <div class="custom-file-upload"><input type="file" id="pipe-cam" class="camera-input hidden-input" accept="image/*"><label for="pipe-cam" class="upload-label"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Pipes Reference</label></div>
                <div class="canvas-container"><canvas id="canvas-rwpsvp" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn highlight-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path></svg></button><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button></div><div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button></div>
                </div>
            </div>

            <div class="form-group mt-30"><label class="form-group__label">Wall Obstacles</label><textarea id="wallObstacles" class="form-group__input" rows="2"></textarea></div>
        </article>

        <article class="card">
            <h2 class="card__title">Design Specification</h2>
            <div class="form-grid">
                <div class="form-group"><label class="form-group__label">Build Type</label><select id="buildType" class="form-group__input"><option value="">Select...</option><option value="Conservatory">Conservatory</option><option value="Extension">Extension</option><option value="Porch">Porch</option><option value="Roof and Frame">Roof and Frame</option><option value="Other">Other</option></select></div>
                <div class="form-group"><label class="form-group__label">Roof Type</label><select id="roofType" class="form-group__input"><option value="">Select...</option><option value="Ultra380">Ultra380</option><option value="LivinRoof">LivinRoof</option><option value="Glass Roof">Glass Roof</option><option value="Flat Roof">Flat Roof</option><option value="Other">Other</option></select></div>
                <div class="form-group"><label class="form-group__label">Size (mm)</label><input type="text" id="proposedSize" class="form-group__input"></div>
                <div class="form-group">
                    <label class="form-group__label">Frame Colour</label>
                    <select id="frameColour" class="form-group__input"><option value="">Select...</option><option value="White">White</option><option value="Grey Foil on White">Grey Foil on White</option><option value="Grey Foil">Grey Foil</option><option value="Rosewood">Rosewood</option><option value="Light Oak">Light Oak</option><option value="Black Brown Foil">Black Brown Foil</option><option value="Agate Grey">Agate Grey</option></select>
                </div>
                <div class="form-group"><label class="form-group__label">Base Material</label><select id="newBuildMaterial" class="form-group__input"><option value="">Select...</option><option value="Brick">Brick</option><option value="Block only">Block only</option><option value="Natural Stone">Natural Stone</option><option value="HUP Wall System">HUP Wall System</option></select></div>
                <div class="form-group"><label class="form-group__label">Budget</label><input type="text" id="budget" class="form-group__input"></div>
            </div>

            <div class="form-group mt-30">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:8px;">
                    <label class="form-group__label" style="margin:0;">Consultant Notes</label>
                    <button type="button" id="dictateBtn" class="tool-btn w-auto" style="margin:0; background:rgba(230, 57, 70, 0.15); color:#ff6b6b; border:none;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px; vertical-align:middle;"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg> Dictate</button>
                </div>
                <textarea id="designerNotes" class="form-group__input" rows="4" placeholder="Brief design summary..."></textarea>
            </div>

            <div class="canvas-group mt-30" data-id="designersketch">
                <label class="form-group__label accent-text mb-10">Digital Sketch Pad</label>
                <div class="canvas-container" style="background:#0f151c;"><canvas id="canvas-designersketch" width="600" height="400"></canvas></div>
                <div class="canvas-controls">
                    <button type="button" class="tool-btn lock-btn canvas-locked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                    <div class="tool-section"><button type="button" class="tool-btn freehand-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button><button type="button" class="tool-btn line-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button><button type="button" class="tool-btn text-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg></button></div>
                    <div class="tool-section flex-right"><button type="button" class="tool-btn undo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button><button type="button" class="tool-btn clear-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button></div>
                </div>
            </div>
        </article>

        <div class="action-block">
            <button id="generateCustomerPdfBtn" class="button btn-outline">Customer Summary</button>
            <button id="generateInternalPdfBtn" class="button">Build Technical PDF</button>
        </div>
        <button id="resetFormBtn" class="button btn-danger mt-30">Reset Session</button>
    </main>

    <div id="profileModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Consultant Profile</h2>
            <div class="form-group"><label class="form-group__label">Name</label><input type="text" id="profName" class="form-group__input"></div>
            <div class="form-group"><label class="form-group__label">Email</label><input type="email" id="profEmail" class="form-group__input"></div>
            <div class="form-group"><label class="form-group__label">Phone</label><input type="tel" id="profPhone" class="form-group__input"></div>
            <div class="action-block mt-30">
                <button id="saveProfileBtn" class="button" style="margin:0;">Save</button>
                <button id="closeProfileBtn" class="button btn-outline" style="margin:0;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="pdfTemplateInternal" style="display:none; width:800px; padding:40px; background:#fff; color:#333; font-family:sans-serif;">
        <div class="pdf-page" style="page-break-after:always;text-align:center;"><h1 style="color:#0F3759;">Technical Survey</h1></div>
    </div>
    <div id="pdfTemplateCustomer" style="display:none; width:800px; padding:40px; background:#fff; color:#333; font-family:sans-serif;">
        <div class="pdf-page" style="page-break-after:always;"><h1 style="color:#0F3759;">Design Consultation</h1></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <script src="designers.js"></script>
    <script src="app.js"></script>
</body>
</html>
