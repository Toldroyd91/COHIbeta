<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COHI Project Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1118; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="vaultLogin" class="glass p-8 rounded-2xl w-full max-w-sm text-center">
        <h1 class="text-2xl font-bold mb-6 text-orange-500">PROJECT VAULT</h1>
        <input type="text" id="vPostcode" placeholder="Project Postcode" class="w-full bg-slate-900 p-3 rounded-lg mb-4 border border-slate-700">
        <input type="text" id="vCustNum" placeholder="Customer Number" class="w-full bg-slate-900 p-3 rounded-lg mb-6 border border-slate-700">
        <button id="unlockBtn" class="w-full bg-orange-600 py-3 rounded-lg font-bold hover:bg-orange-500 transition">ACCESS VAULT</button>
    </div>

    <div id="vaultDashboard" class="hidden w-full max-w-4xl p-6">
        <div class="glass p-6 rounded-2xl mb-6">
            <h2 class="text-sm uppercase tracking-widest text-slate-400 mb-4">Project Status</h2>
            <div class="flex justify-between items-center" id="roadmapContainer">
                </div>
        </div>
        
        <div id="chatBubble" class="fixed bottom-6 right-6 bg-green-500 p-4 rounded-full shadow-lg cursor-pointer hover:scale-105 transition">

</html>
